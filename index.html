<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Ark: Survival</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars"></div>

    <div class="terminal">
        <header class="terminal-header">
            <div class="status-container">
                <span class="status-indicator">SYSTEM: ONLINE</span>
                <button class="reset-btn" onclick="confirmResetProgress()" title="Reset progress">🔄 Reset</button>
            </div>
            <nav class="day-nav" id="dayNav">
                <button class="nav-btn active" id="btn-intro" onclick="loadDay('intro')">Intro</button>
                <button class="nav-btn locked" id="btn-day1" onclick="loadDay('day1')" disabled>Day 01 🔒</button>
                <button class="nav-btn locked" id="btn-day2" onclick="loadDay('day2')" disabled>Day 02 🔒</button>
                <button class="nav-btn locked" id="btn-day3" onclick="loadDay('day3')" disabled>Day 03 🔒</button>
                <button class="nav-btn locked" id="btn-day4" onclick="loadDay('day4')" disabled>Day 04 🔒</button>
                <button class="nav-btn locked" id="btn-day5" onclick="loadDay('day5')" disabled>Day 05 🔒</button>
                <button class="nav-btn locked" id="btn-day6" onclick="loadDay('day6')" disabled>Day 06 🔒</button>
                <button class="nav-btn locked" id="btn-day7" onclick="loadDay('day7')" disabled>Day 07 🔒</button>
                <button class="nav-btn locked" id="btn-final" onclick="loadDay('final')" disabled>FINAL 🔒</button>
            </nav>
        </header>

        <main class="terminal-body">
            <div class="ship-hud" id="shipHUD">
                <div class="hud-item">
                    <span class="hud-icon">💧</span>
                    <div class="hud-bar-wrapper">
                        <span class="hud-label">Water</span>
                        <div class="hud-bar"><div class="hud-fill" id="hud-water" style="width: 0%;"></div></div>
                    </div>
                    <span class="hud-percent" id="hud-water-txt">0%</span>
                </div>
                <div class="hud-item">
                    <span class="hud-icon">🍏</span>
                    <div class="hud-bar-wrapper">
                        <span class="hud-label">Bio-fuel</span>
                        <div class="hud-bar"><div class="hud-fill" id="hud-food" style="width: 0%;"></div></div>
                    </div>
                    <span class="hud-percent" id="hud-food-txt">0%</span>
                </div>
                <div class="hud-item">
                    <span class="hud-icon">🤍</span>
                    <div class="hud-bar-wrapper">
                        <span class="hud-label">Mental Shield</span>
                        <div class="hud-bar"><div class="hud-fill" id="hud-mind" style="width: 0%;"></div></div>
                    </div>
                    <span class="hud-percent" id="hud-mind-txt">0%</span>
                </div>
                <div class="hud-item">
                    <span class="hud-icon">🔋</span>
                    <div class="hud-bar-wrapper">
                        <span class="hud-label">Thrusters</span>
                        <div class="hud-bar"><div class="hud-fill" id="hud-energy" style="width: 0%;"></div></div>
                    </div>
                    <span class="hud-percent" id="hud-energy-txt">0%</span>
                </div>
            </div>

            <div class="output-wrapper">
                <p id="story-text" class="typing-text"></p>
            </div>
            
            <button id="action-btn" class="action-btn" onclick="handleAction()">START SYSTEMS CALIBRATION</button>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
